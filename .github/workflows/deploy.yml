name: Deploy Spring E-com Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/spring-e-com-back-end
            
            # Force server to match GitHub exactly
            git fetch origin
            git reset --hard origin/main
            
            # Grant permissions and build
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            
            # Restart the service
            sudo systemctl restart spring-e-com.service